<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // นำ URL ที่ได้จาก Web App ของ Google Apps Script มาใส่ที่นี่
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyLD_Zc4CHV9CN971U7gAh0RNOMyTjqQPg5RKWB-SEmd6n4U-QdBk31G1RPKJRIJJc/exec'; 
  let myModal;

window.onload = () => {
  // 1. ดึงข้อมูล Header หลัก
  fetch(`${WEB_APP_URL}?action=getHeader`)
    .then(res => res.json())
    .then(header => {
      const mainH = document.getElementById('mainHeader');
      const subH = document.getElementById('subHeader');
      if (mainH && header[0]) mainH.innerText = header[0];
      if (subH && header[1]) subH.innerText = header[1];
    }).catch(err => console.error("Header error:", err));

  // 2. ดึงหัวข้อคอลัมน์จาก Sheet
  fetch(`${WEB_APP_URL}?action=getColumns`)
    .then(res => res.json())
    .then(cols => {
      const tE = document.getElementById('title_E');
      const tG = document.getElementById('title_G');
      const tH = document.getElementById('title_H');
      if (tE && cols[4]) tE.innerText = cols[4];
      if (tG && cols[6]) tG.innerText = cols[6];
      if (tH && cols[7]) tH.innerText = cols[7];
    }).catch(err => console.error("Columns error:", err));
};

  function performSearch() {
    const id = document.getElementById('studentId').value;
    if(!id) return alert('กรุณากรอกรหัสนักศึกษา');
    
    document.getElementById('resultArea').style.display = 'none';

    fetch(`${WEB_APP_URL}?action=search&id=${id}`)
      .then(res => res.json())
      .then(data => {
        if(data) {
          document.getElementById('resultArea').style.display = 'block';
          document.getElementById('resName').innerText = data.name;
          document.getElementById('resLevel').innerText = data.level;
          document.getElementById('resNo').innerText = data.roomNo;
          document.getElementById('resCurrentDebt').innerText = Number(data.currentDebt).toLocaleString('th-TH');
          document.getElementById('resOldDebt').innerText = Number(data.oldDebt).toLocaleString('th-TH');
          document.getElementById('resScholar').innerText = data.scholarship || '-';
          document.getElementById('resStatus').innerText = data.status;
        } else {
          alert('ไม่พบข้อมูลรหัสนักศึกษานี้ในระบบ');
          document.getElementById('resultArea').style.display = 'none';
        }
      });
  }

  function showLogin() {
    myModal = new bootstrap.Modal(document.getElementById('adminModal'));
    myModal.show();
  }

  function login() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    
    fetch(`${WEB_APP_URL}?action=login&user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`)
      .then(res => res.json())
      .then(isValid => {
        if(isValid) {
          document.getElementById('adminBody').innerHTML = `
            <div class="alert alert-success rounded-3">เข้าสู่ระบบ Admin สำเร็จ!</div>
            <p class="text-muted">ขณะนี้คุณสามารถแก้ไขข้อมูลได้โดยตรงที่หน้า Google Sheets:</p>
            <ul class="text-muted">
              <li>แก้ไขหัวข้อใหญ่: เข้าไปที่ Sheet <strong>'header'</strong> แก้ไขช่อง A1 และ A2</li>
              <li>แก้ไขหัวข้อคอลัมน์ข้อมูล: เข้าไปที่ Sheet <strong>'studentData'</strong> แก้ไขแถวที่ 1</li>
            </ul>
          `;
        } else {
          alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
        }
      });
  }
</script>
