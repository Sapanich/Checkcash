<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ⚠️ เปลี่ยน URL ตรงนี้ให้เป็น Web App URL ของคุณที่ได้มาจาก Google Apps Script
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyLD_Zc4CHV9CN971U7gAh0RNOMyTjqQPg5RKWB-SEmd6n4U-QdBk31G1RPKJRIJJc/exec'; 
  let myModal;

  // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
  window.onload = () => {
    if (!WEB_APP_URL || WEB_APP_URL.includes('https://script.google.com/macros/s/AKfycbyLD_Zc4CHV9CN971U7gAh0RNOMyTjqQPg5RKWB-SEmd6n4U-QdBk31G1RPKJRIJJc/exec')) {
      console.error('https://script.google.com/macros/s/AKfycbyLD_Zc4CHV9CN971U7gAh0RNOMyTjqQPg5RKWB-SEmd6n4U-QdBk31G1RPKJRIJJc/exec');
      return;
    }

    // 1. ดึงข้อมูล Header หลัก
    fetch(`${WEB_APP_URL}?action=getHeader`)
      .then(res => res.json())
      .then(header => {
        if (header && header.length > 0) {
          const mainHeader = document.getElementById('mainHeader');
          const subHeader = document.getElementById('subHeader');
          if (mainHeader) mainHeader.innerText = header[0] || '';
          if (subHeader) subHeader.innerText = header[1] || '';
        }
      })
      .catch(err => console.error('Error fetching header:', err));

    // 2. ดึงหัวข้อคอลัมน์จาก Sheet
    fetch(`${WEB_APP_URL}?action=getColumns`)
      .then(res => res.json())
      .then(cols => {
        if (cols && cols.length > 0) {
          const tE = document.getElementById('title_E');
          const tG = document.getElementById('title_G');
          const tH = document.getElementById('title_H');
          if (tE) tE.innerText = cols[4] || 'ค่าเทอมคงค้าง';
          if (tG) tG.innerText = cols[6] || 'ทุนการศึกษา/กยศ.';
          if (tH) tH.innerText = cols[7] || 'ค่าเทอมคงค้างเทอมก่อน';
        }
      })
      .catch(err => console.error('Error fetching columns:', err));
  };

  // ฟังก์ชันค้นหาข้อมูล
  function performSearch() {
    const studentIdInput = document.getElementById('studentId');
    if (!studentIdInput) return;
    
    const id = studentIdInput.value;
    if (!id) return alert('กรุณากรอกรหัสนักศึกษา');
    
    const resultArea = document.getElementById('resultArea');
    if (resultArea) resultArea.style.display = 'none';

    fetch(`${WEB_APP_URL}?action=search&id=${id}`)
      .then(res => res.json())
      .then(data => {
        if (data) {
          if (resultArea) resultArea.style.display = 'block';
          
          const resName = document.getElementById('resName');
          const resLevel = document.getElementById('resLevel');
          const resNo = document.getElementById('resNo');
          const resCurrentDebt = document.getElementById('resCurrentDebt');
          const resOldDebt = document.getElementById('resOldDebt');
          const resScholar = document.getElementById('resScholar');
          const resStatus = document.getElementById('resStatus');

          if (resName) resName.innerText = data.name || '';
          if (resLevel) resLevel.innerText = data.level || '';
          if (resNo) resNo.innerText = data.roomNo || '';
          if (resScholar) resScholar.innerText = data.scholarship || '-';
          if (resStatus) resStatus.innerText = data.status || '';
          
          // แปลงเป็นตัวเลขและจัดรูปแบบ (เช่น 8,000)
          if (resCurrentDebt) resCurrentDebt.innerText = Number(data.currentDebt || 0).toLocaleString('th-TH');
          if (resOldDebt) resOldDebt.innerText = Number(data.oldDebt || 0).toLocaleString('th-TH');
        } else {
          alert('ไม่พบข้อมูลรหัสนักศึกษานี้ในระบบ');
          if (resultArea) resultArea.style.display = 'none';
        }
      })
      .catch(err => {
        console.error('Error searching student:', err);
        alert('เกิดข้อผิดพลาดในการเชื่อมต่อระบบฐานข้อมูล');
      });
  }

  // ส่วน Admin
  function showLogin() {
    const modalEl = document.getElementById('adminModal');
    if (modalEl) {
      myModal = new bootstrap.Modal(modalEl);
      myModal.show();
    }
  }

  function login() {
    const userInput = document.getElementById('user');
    const passInput = document.getElementById('pass');
    if (!userInput || !passInput) return;

    const u = userInput.value;
    const p = passInput.value;
    
    fetch(`${WEB_APP_URL}?action=login&user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`)
      .then(res => res.json())
      .then(isValid => {
        const adminBody = document.getElementById('adminBody');
        if (isValid) {
          if (adminBody) {
            adminBody.innerHTML = `
              <div class="alert alert-success rounded-3">เข้าสู่ระบบ Admin สำเร็จ!</div>
              <p class="text-muted">ขณะนี้คุณสามารถแก้ไขข้อมูลได้โดยตรงที่หน้า Google Sheets:</p>
              <ul class="text-muted">
                <li>แก้ไขหัวข้อใหญ่: เข้าไปที่ Sheet <strong>'header'</strong> แก้ไขช่อง A1 และ A2</li>
                <li>แก้ไขหัวข้อคอลัมน์ข้อมูล: เข้าไปที่ Sheet <strong>'studentData'</strong> แก้ไขแถวที่ 1</li>
              </ul>
            `;
          }
        } else {
          alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
        }
      })
      .catch(err => console.error('Admin login error:', err));
  }
</script>
