<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบตรวจสอบสถานะการชำระค่าเทอม</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #fafbfc; }
    .main-container { max-width: 600px; margin-top: 50px; }
    .search-section { 
      background: white; border-radius: 20px; 
      padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
      border: 1px solid #eee; margin-bottom: 30px;
    }
    .header-main { color: #1a202c; font-weight: 450; font-size: 1.8rem; margin-bottom: 5px; }
    .header-sub { color: #c20505; font-weight: 300; font-size: 1.2rem; }
    .btn-search {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; font-size: 1.2rem; font-weight: 500;
      padding: 12px; border-radius: 10px; transition: all 0.2s;
    }
    .btn-search:hover { opacity: 0.9; transform: translateY(-1px); }
    .result-section { 
      display: none; background: white; border-radius: 20px; 
      padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid #eee;
    }
    .student-info-box { border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 25px; }
    .student-name { font-size: 2rem; font-weight: 300; color: #2d3748; }
    .student-meta { font-size: 1.1rem; color: #718096; font-weight: 300; }
    .info-card { border: 2px solid #e2e8f0; border-radius: 15px; padding: 15px; background: #fff; height: 100%; }
    .info-label { font-size: 1rem; color: #4a5568; font-weight: 500; margin-bottom: 8px; }
    .info-value-num { font-size: 2rem; font-weight: 700; color: #e53e3e; }
    .info-value-text { font-size: 1.8rem; font-weight: 500; color: #2d3748; }
    .status-panel { margin-top: 30px; }
    .status-panel-label { font-size: 1.1rem; color: #4a5568; font-weight: 500; margin-bottom: 10px; }
    .status-panel-value {
      background-color: #fefcbf; color: #2b6cb0; border: 2px solid #faf089;
      padding: 15px; border-radius: 10px; font-size: 1.8rem; font-weight: 700; text-align: center;
    }
  </style>
</head>
<body>

<div class="container main-container">
  <div class="text-center mb-5">
    <h1 id="mainHeader" class="header-main">กำลังโหลด...</h1>
    <p id="subHeader" class="header-sub"></p>
  </div>

  <div class="search-section">
    <div class="mb-4">
      <label class="form-label font-weight-bold text-muted" style="font-size: 1.1rem">รหัสนักศึกษา</label>
      <input type="text" id="studentId" class="form-control form-control-lg rounded-pill" placeholder="กรุณากรอกรหัสนักศึกษา 5 หลัก">
    </div>
    <button onclick="performSearch()" class="btn-search w-100">ตรวจสอบข้อมูล</button>
  </div>

  <div id="resultArea" class="result-section">
    <div class="student-info-box text-center">
      <div id="resName" class="student-name"></div>
      <div class="student-meta"><span id="resLevel"></span> | เลขที่ <span id="resNo"></span></div>
    </div>

    <div class="row g-4 text-center">
      <div class="col-6">
        <div class="info-card">
          <div class="info-label" id="title_E">กำลังโหลด...</div>
          <div id="resCurrentDebt" class="info-value-num"></div>
        </div>
      </div>
      <div class="col-6">
        <div class="info-card">
          <div class="info-label" id="title_G">กำลังโหลด...</div>
          <div id="resScholar" class="info-value-text"></div>
        </div>
      </div>
      <div class="col-12">
        <div class="info-card">
          <div class="info-label" id="title_H">กำลังโหลด...</div>
          <div id="resOldDebt" class="info-value-num"></div>
        </div>
      </div>
    </div>

    <div class="status-panel">
      <div class="status-panel-label text-center">สถานะจากฝ่ายการเงิน</div>
      <div id="resStatus" class="status-panel-value"></div>
    </div>
  </div>
</div>

<!-- ส่วน Admin -->
<div class="modal fade" id="adminModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content rounded-4 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title font-weight-bold">Admin Login</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4" id="adminBody">
        <input type="text" id="user" class="form-control mb-3 rounded-pill" placeholder="Username">
        <input type="password" id="pass" class="form-control mb-3 rounded-pill" placeholder="Password">
        <button class="btn btn-primary w-100 rounded-pill btn-lg" onclick="login()">เข้าสู่ระบบ</button>
      </div>
    </div>
  </div>
</div>

<div style="position: fixed; top: 15px; right: 15px; z-index: 1000;">
  <button class="btn btn-outline-secondary btn-sm rounded-pill" onclick="showLogin()">⚙️</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // 🔴 วาง URL ของ Google Web App (ที่ได้จากขั้นตอนที่ 2) ในช่องนี้
  const API_URL = 'https://script.google.com/macros/s/AKfycbwmXMK7b12xE-lJbWtfo9QFUTjxMSMCdEzjzEXS6fhO5ae-IJMKEOXrY7JZQp-m7M4/exec';

  let myModal;

  window.onload = () => {
    // ลบหรือแก้เงื่อนไข if อันเก่าออก แล้วให้เหลือแค่นี้พอครับ
    if (!API_URL) {
      document.getElementById('mainHeader').innerText = 'กรุณาตั้งค่า API_URL';
      return;
    }
    
    // ดึงค่า config เริ่มต้นทั้งหมดในรอบเดียวเพื่อความเร็ว
    fetch(`${API_URL}?action=getInitConfig`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('mainHeader').innerText = data.header[0] || 'ระบบตรวจสอบข้อมูล';
        document.getElementById('subHeader').innerText = data.header[1] || '';
        document.getElementById('title_E').innerText = data.columns[4];
        document.getElementById('title_G').innerText = data.columns[6];
        document.getElementById('title_H').innerText = data.columns[7];
      })
      .catch(err => {
        console.error("Error loading config:", err);
        document.getElementById('mainHeader').innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อข้อมูล';
      });
  };

  function showLogin() {
    myModal = new bootstrap.Modal(document.getElementById('adminModal'));
    myModal.show();
  }

  function login() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    
    fetch(`${API_URL}?action=checkAdmin&user=${u}&pass=${p}`)
      .then(res => res.json())
      .then(isValid => {
        if(isValid) {
          document.getElementById('adminBody').innerHTML = `
            <div class="alert alert-success rounded-3">เข้าสู่ระบบ Admin สำเร็จ!</div>
            <p class="text-muted">ขณะนี้คุณสามารถแก้ไขข้อมูลได้โดยตรงที่หน้า Google Sheets:</p>
            <ul class="text-muted">
              <li>แก้ไขหัวข้อใหญ่: เข้าไปที่ Sheet <strong>'header'</strong> แก้ไขช่อง A1 และ A2</li>
              <li>แก้ไขหัวข้อคอลัมน์ข้อมูล: เข้าไปที่ Sheet <strong>'studentData'</strong> แก้ไขแถวที่ 1</li>
            </ul>
          `;
        } else {
          alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
        }
      });
  }
</script>
</body>
</html>
